<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekashunyam Portal</title>

<link rel="stylesheet" href="../css/portal.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@500&family=Libre+Baskerville&family=Montserrat:wght@500&family=Spectral:wght@500&display=swap" rel="stylesheet">
</head>

<body>
<div class="fog"></div>
<h1 class="portal-title">EKASHUNYAM PORTAL</h1>

<div class="portal-row">

    <!-- HOME -->
    <div class="portal-item" data-link="welcome.html">
        <img src="../.Assets/icons/PortalGate.png" class="icon">
        <img src="../.Assets/icons/portal_base.png" class="base">
        <p>HOME</p>
    </div>

    <!-- ABOUT -->
    <div class="portal-item" data-link="about.html">
        <img src="../.Assets/icons/MagicBook.png" class="icon">
        <img src="../.Assets/icons/portal_base.png" class="base">
        <p>ABOUT</p>
    </div>

    <!-- GUIDELINES -->
    <div class="portal-item" data-link="guidelines.html">
        <img src="../.Assets/icons/Scroll.png" class="icon">
        <img src="../.Assets/icons/portal_base.png" class="base">
        <p>GUIDELINES</p>
    </div>

    <!-- EVENTS -->
    <div class="portal-item" data-link="events.html">
        <img src="../.Assets//icons/events.png" class="icon">
        <img src="../.Assets/icons/portal_base.png" class="base">
        <p>EVENTS</p>
    </div>

    <!-- CONTACT -->
    <div class="portal-item" data-link="contact.html">
        <img src="../.Assets/icons/BrokenClock.png" class="icon">
        <img src="../.Assets/icons/portal_base.png" class="base">
        <p>CONTACT</p>
    </div>

</div>
<div id="portal-transition">
    <div class="portal-flash"></div>
</div>
<video id="bg-video" autoplay muted loop playsinline>
    <source src="../.Assets/Background/portalbg.mp4" type="video/mp4">
</video>

<div class="portal-buttons">
    <button id="prevBtn">Previous</button>
    <button id="registerBtn">Register</button>
</div>
<script src="../js/script.js"></script>
</body>
</html>
